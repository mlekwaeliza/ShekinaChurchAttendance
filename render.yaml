services:
  - type: web
    name: church-attendance
    env: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DB_CLIENT
        value: postgres
      - key: PGSSL
        value: true
      - key: COOKIE_SECURE
        value: true
      - key: TRUST_PROXY
        value: true
      - key: BACKUP_RETENTION_DAYS
        value: 30
      - key: DATABASE_URL
        sync: false
      - key: SESSION_SECRET
        generateValue: true
